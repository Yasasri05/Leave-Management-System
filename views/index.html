<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Portal</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <aside class="auth-aside">
      <div class="brand-mark"><span class="dot"></span> Leave Portal</div>
      <div class="quote">
        "Manage your leave requests quickly and efficiently."
      </div>
      <div class="stamp">
        Employee Leave Management System
      </div>
    </aside>

    <div class="auth-form-wrap">
      <h1>Welcome </h1>
      <p class="sub">Login to access your leave dashboard.</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Username@company.com"
            required
          >
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Login
        </button>
      </form>

      <p class="auth-switch">
        New Employee? <a href="/register">Register Here</a>
      </p>

      <p class="helper-text text-center" style="margin-top:18px;">
        Admin Login: admin@company.com / Admin@123
      </p>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
