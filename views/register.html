<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register · Leave Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <aside class="auth-aside">
      <div class="brand-mark"><span class="dot"></span> Leave Portal</div>
      <div class="quote">"Onboard once. Apply for leave anytime, from anywhere."</div>
      <div class="stamp">Leave Management System — Employee &amp; Admin Portal</div>
    </aside>
    <div class="auth-form-wrap">
      <h1>Create your account</h1>
      <p class="sub">Register as an Employee or Admin to continue.</p>

      <div class="role-toggle">
        <button type="button" data-role="employee" class="active">Employee</button>
        <button type="button" data-role="admin">Admin / Manager</button>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="employeeId">Employee ID</label>
            <input type="text" id="employeeId" required placeholder="EMP00X" />
          </div>
          <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" required placeholder="Engineering" />
          </div>
        </div>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="Username" />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="Enter your email" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Min 6 characters" />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" required placeholder="Re-enter password" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/">Login</a></p>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
